
<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Milka ❤️</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* Fondo con slideshow */
.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    z-index: -1;
    animation: slide 20s infinite;
}

@keyframes slide {
    0% { background-image: url('foto1.jpg'); }
    25% { background-image: url('foto2.jpg'); }
    50% { background-image: url('foto3.jpg'); }
    75% { background-image: url('foto4.jpg'); }
    100% { background-image: url('foto1.jpg'); }
}

.container {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    max-width: 400px;
    backdrop-filter: blur(10px);
}

h1 {
    color: #ff8fab;
}

p {
    font-size: 18px;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

#yes {
    background-color: #ff4d6d;
    color: white;
}

#no {
    background-color: #ccc;
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="container">
    <h1>Milka ❤️</h1>
    <p>
        Desde que llegaste a mi vida, todo se siente diferente...
        <br><br>
        Me haces feliz de una forma que no puedo explicar.
        <br><br>
        ¿Quieres ser mi enamorada? 💖
    </p>

    <button id="yes" onclick="respuestaSi()">Sí 💕</button>
    <button id="no" onmouseover="moverBoton()">No 😢</button>
</div>

<script>
function respuestaSi() {
    // Cambiar fondo a la imagen final
    const bg = document.querySelector('.bg');
    bg.style.animation = 'none';
    bg.style.backgroundImage = "url('final.jpg')"; // <-- pon aquí tu imagen final

    // Mostrar mensaje
    document.querySelector('.container').innerHTML = `
        <h1 style="color:#fff;">Sabía que dirías que sí 💖🥹</h1>
        <p style="font-size:18px;">Ahora oficialmente… eres mi enamorada 💕</p>
    `;
}

function moverBoton() {
    const boton = document.getElementById('no');
    boton.style.position = 'absolute';
    boton.style.top = Math.random() * window.innerHeight + 'px';
    boton.style.left = Math.random() * window.innerWidth + 'px';
}
</script>

</body>
</html>
