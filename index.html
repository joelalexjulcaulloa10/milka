<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Milka ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* Fondo slideshow */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    z-index: -1;
    animation: slide 20s infinite;
}

@keyframes slide {
    0% { background-image: url('foto1.jpg'); }
    25% { background-image: url('foto2.jpg'); }
    50% { background-image: url('foto3.jpg'); }
    75% { background-image: url('foto4.jpg'); }
    100% { background-image: url('foto1.jpg'); }
}

.container {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yes {
    background: #ff4d6d;
    color: white;
}

#no {
    background: gray;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
    <h1>Milka ❤️</h1>
    <p>Desde que llegaste a mi vida todo es más bonito...</p>
    <p>¿Quieres ser mi enamorada? 💖</p>

    <button id="yes" onclick="si()">Sí 💕</button>
    <button id="no" onmouseover="mover()">No 😢</button>
</div>

<script>
function si() {
    document.querySelector('.bg').style.animation = "none";
    document.querySelector('.bg').style.backgroundImage = "url('final.jpg')";

    document.querySelector('.container').innerHTML =
        "<h1>Sabía que dirías que sí 💖🥹</h1>";
}

function mover() {
    let btn = document.getElementById("no");
    btn.style.position = "absolute";
    btn.style.top = Math.random() * window.innerHeight + "px";
    btn.style.left = Math.random() * window.innerWidth + "px";
}
</script>

</body>
</html>
